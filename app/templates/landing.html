<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☁️ Cloud9 Care - 건강한 일상의 시작</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .landing-container {
            max-width: 900px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .landing-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .landing-left {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .landing-left h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .landing-left p {
            font-size: 16px;
            line-height: 1.6;
            opacity: 0.95;
            margin-bottom: 30px;
        }

        .features {
            list-style: none;
            margin-bottom: 40px;
        }

        .features li {
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .features li:before {
            content: "✓";
            font-weight: bold;
            font-size: 18px;
        }

        .landing-right {
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .landing-right h2 {
            font-size: 28px;
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .auth-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .btn-secondary:hover {
            background: #e8e8e8;
            border-color: #d0d0d0;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .landing-content {
                grid-template-columns: 1fr;
            }

            .landing-left {
                padding: 40px 30px;
            }

            .landing-right {
                padding: 40px 30px;
            }

            .landing-left h1 {
                font-size: 32px;
            }

            .landing-right h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="landing-content">
            <div class="landing-left">
                <h1>☁️ 구름 위에 오른 듯한 건강한 일상</h1>
                <p>의료 기록을 이해하기 쉬운 맞춤형 건강 가이드로 연결합니다.</p>
                <ul class="features">
                    <li>AI 기반 맞춤형 건강 가이드</li>
                    <li>복약 알람 및 건강 추적</li>
                    <li>실시간 건강 상담 챗봇</li>
                    <li>처방전 자동 분석</li>
                </ul>
            </div>
            <div class="landing-right">
                <h2>시작하기</h2>
                <div class="auth-buttons">
                    <a href="/login" class="btn btn-primary">로그인</a>
                    <div class="divider">또는</div>
                    <a href="/signup" class="btn btn-secondary">회원가입</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 로그인 상태면 랜딩에 머물지 않고 대시보드로
        const token = localStorage.getItem('access_token');
        if (token) window.location.replace('/dashboard');
    </script>
</body>
</html>
